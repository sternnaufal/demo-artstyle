<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Y2K Zone</title>
  <style>
    body {
      margin: 0;
      font-family: Verdana, Arial, sans-serif;
      color: #00ffff;
      background: url("https://www.transparenttextures.com/patterns/stardust.png"),
                  linear-gradient(45deg, #000033, #660066, #000033);
      background-size: auto, cover;
      cursor: url("https://cur.cursors-4u.net/symbols/sym-4/sym331.cur"), auto;
    }

    header {
      text-align: center;
      padding: 20px;
      background: linear-gradient(to right, #0000ff, #9900cc);
      border-bottom: 4px double #00ffff;
      box-shadow: 0 0 20px #0ff inset;
    }

    header h1 {
      font-size: 3rem;
      color: #fff;
      text-shadow: 2px 2px #00ffff, 0 0 15px #ff00ff;
      margin: 0;
    }

    marquee {
      font-size: 1.2rem;
      color: #ff0;
      text-shadow: 0 0 5px #fff, 0 0 15px #ff0;
      background: #000022;
      padding: 5px;
      border-top: 2px dashed #0ff;
      border-bottom: 2px dashed #0ff;
    }

    main {
      width: 100%;
      margin: 30px auto;
      padding: 20px;
      border: 3px ridge #00ffff;
      background: rgba(0, 0, 30, 0.8);
      box-shadow: 0 0 25px #ff00ff;
    }

    .button {
      display: inline-block;
      padding: 15px 25px;
      margin: 10px;
      background: linear-gradient(to bottom, #00ffff, #0066cc);
      border: 3px outset #fff;
      color: #000;
      font-weight: bold;
      text-transform: uppercase;
      text-shadow: 1px 1px #fff;
      box-shadow: 0 0 10px #0ff;
      cursor: pointer;
    }

    .button:hover {
      background: linear-gradient(to bottom, #ffff00, #ff6600);
      color: #fff;
      text-shadow: 0 0 5px #000;
    }

    footer {
      text-align: center;
      padding: 10px;
      margin-top: 20px;
      border-top: 4px double #0ff;
      font-size: 0.9rem;
      color: #fff;
      text-shadow: 0 0 5px #ff00ff;
    }

    /* Animasi blink ala era 2000 */
    .blink {
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌐 Welcome to Y2K Zone 🌐</h1>
  </header>

  <marquee scrollamount="7">✨ Cyber Dreams ✨ Glitter Graphics ✨ 56K Modem Vibes ✨</marquee>

  <main>
    <p style="text-align:center;" class="blink">
      <img src="https://www.animatedimages.org/data/media/164/animated-star-image-0018.gif" alt="star"> 
      <b>Click a Button to Enter the Future!</b> 
      <img src="https://www.animatedimages.org/data/media/164/animated-star-image-0018.gif" alt="star">
    </p>

    <div style="text-align:center;">
      <div class="button">💾 Downloads</div>
      <div class="button">📀 MP3 Zone</div>
      <div class="button">💻 Chat Room</div>
      <div class="button">🌐 Surf Links</div>
    </div>
  </main>

  <footer>
    <p>© 2002 - Hosted on <span class="blink">GeoCities</span> • Best viewed in Netscape 4.7</p>
  </footer>
</body>
</html>
