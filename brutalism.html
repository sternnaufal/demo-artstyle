<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brutalism Web Landing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: #000;
    }

    header {
      background: #ff0;
      padding: 20px;
      border-bottom: 5px solid #000;
    }

    header h1 {
      font-size: 4rem;
      margin: 0;
      text-transform: uppercase;
      line-height: 1;
    }

    header p {
      font-size: 1.2rem;
      margin: 5px 0 0;
    }

    nav {
      display: flex;
      gap: 20px;
      padding: 15px;
      border-bottom: 3px dashed #000;
      background: #0ff;
    }

    nav a {
      text-decoration: none;
      color: #000;
      font-weight: bold;
      font-size: 1.2rem;
      border: 3px solid #000;
      padding: 5px 10px;
      transition: background .2s;
    }

    nav a:hover {
      background: #f00;
      color: #fff;
    }

    main {
      padding: 40px;
    }

    main h2 {
      font-size: 3rem;
      border: 4px double #000;
      padding: 10px;
      display: inline-block;
      margin-bottom: 30px;
      background: #ff0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      border: 5px solid #000;
      background: #f0f0f0;
      padding: 20px;
      font-size: 1.5rem;
      text-transform: uppercase;
      box-shadow: 8px 8px 0 #000;
      transition: transform .2s;
    }

    .card:hover {
      transform: translate(-5px, -5px);
      box-shadow: 15px 15px 0 #000;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 5px solid #000;
      background: #ff0;
      font-weight: bold;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <h1>Brutalist Landing</h1>
    <p>raw. loud. unapologetic.</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <main>
    <h2>Pick Your Choice</h2>
    <div class="grid">
      <div class="card">🔥 Hard Edges</div>
      <div class="card">⚡ Bold Colors</div>
      <div class="card">💥 No Rules</div>
      <div class="card">📦 Big Blocks</div>
      <div class="card">🧱 Raw Layout</div>
      <div class="card">🎨 Contrast</div>
    </div>
  </main>

  <footer>
    Brutalist Web © 2025
  </footer>
</body>
</html>
