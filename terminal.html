<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal Landing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Source Code Pro', monospace;
    background-color: #0a0a0a;
    color: #33ff33;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 2rem;
    border-bottom: 1px solid #33ff33;
  }

  header h1 {
    font-size: 2.8rem;
    color: #33ff33;
    text-shadow: 0 0 5px #33ff33;
  }

  header p {
    font-size: 1.2rem;
    color: #99ff99;
    margin-top: 0.5rem;
  }

  nav {
    margin-top: 1rem;
  }

  nav a {
    text-decoration: none;
    margin: 0 1rem;
    padding: 0.4rem 1rem;
    color: #33ff33;
    border: 1px solid #33ff33;
    border-radius: 4px;
    transition: all 0.2s;
  }

  nav a:hover {
    background-color: #33ff33;
    color: #0a0a0a;
    transform: scale(1.05);
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 3rem 2rem;
  }

  .terminal-panel {
    background-color: #111111;
    border: 1px solid #33ff33;
    border-radius: 6px;
    padding: 2.5rem;
    max-width: 600px;
    text-align: left;
    box-shadow: 0 0 15px #33ff33;
  }

  .terminal-panel h2 {
    font-size: 1.8rem;
    color: #33ff33;
    margin-bottom: 1rem;
  }

  .terminal-panel p {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #99ff99;
    margin-bottom: 1.5rem;
  }

  .btn {
    display: inline-block;
    padding: 0.8rem 2rem;
    font-weight: bold;
    font-size: 1rem;
    color: #0a0a0a;
    background-color: #33ff33;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.2s;
  }

  .btn:hover {
    background-color: #0a0a0a;
    color: #33ff33;
    border: 1px solid #33ff33;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.9rem;
    border-top: 1px solid #33ff33;
    color: #33ff33;
  }
</style>
</head>
<body>

<header>
  <h1>TERMINAL HUB</h1>
  <p>Code • Hack • Explore</p>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Docs</a>
    <a href="#">Contact</a>
  </nav>
</header>

<main>
  <div class="terminal-panel">
    <h2>Welcome to Terminal Hub</h2>
    <p>
      Enter a world of coding, hacking, and digital exploration.<br>
      Navigate the grid, execute commands, and discover secrets hidden in the matrix.
    </p>
    <a href="#" class="btn">Start Terminal</a>
  </div>
</main>

<footer>
  © 2025 • Terminal Style Inspired
</footer>

</body>
</html>
