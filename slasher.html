<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slasher Horror Landing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Roboto Mono', monospace;
    background: #0b0b0b;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 3rem 2rem;
    border-bottom: 2px solid #550000;
  }

  header h1 {
    font-size: 3rem;
    font-weight: 700;
    color: #ff0000;
    text-shadow: 0 0 10px #ff0000, 0 0 20px #800000;
  }

  header p {
    font-size: 1.2rem;
    color: #ff5555;
    margin-top: 0.5rem;
  }

  nav {
    margin-top: 1.5rem;
  }

  nav a {
    text-decoration: none;
    margin: 0 1rem;
    padding: 0.5rem 1.5rem;
    font-weight: 700;
    color: #ff5555;
    border: 1px solid #ff0000;
    transition: all 0.3s;
  }

  nav a:hover {
    background: #ff0000;
    color: #fff;
    transform: translateY(-2px);
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4rem 2rem;
  }

  .panel {
    background: #1a0000;
    border-radius: 10px;
    padding: 3rem;
    max-width: 650px;
    text-align: center;
    box-shadow: 0 0 20px #550000;
  }

  .panel h2 {
    font-size: 2rem;
    color: #ff3333;
    margin-bottom: 1rem;
    text-shadow: 0 0 8px #ff0000;
  }

  .panel p {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #ffaaaa;
    margin-bottom: 2rem;
  }

  .btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
    background: #ff0000;
    border-radius: 5px;
    text-decoration: none;
    box-shadow: 0 0 10px #800000;
    transition: all 0.3s;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 15px #ff0000;
  }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.9rem;
    border-top: 2px solid #550000;
    background: #0b0b0b;
    color: #ff5555;
  }
</style>
</head>
<body>

<header>
  <h1>SLASHER HORROR</h1>
  <p>Dark • Blood • Intense</p>
  <nav>
    <a href="#">Home</a>
    <a href="#">Gallery</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<main>
  <div class="panel">
    <h2>Step Into the Nightmare</h2>
    <p>
      Welcome to the <strong>Slasher Horror</strong> world.<br>
      Dark corridors, blood red accents, and tension everywhere.<br>
      Every click brings you closer to fear.
    </p>
    <a href="#" class="btn">Enter Now</a>
  </div>
</main>

<footer>
  © 2025 • Inspired by Slasher Horror Themes
</footer>

</body>
</html>
