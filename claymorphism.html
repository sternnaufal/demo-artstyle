<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claymorphism Landing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f4f8;
    color: #333;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 2rem 4rem;
    text-align: center;
  }

  header h1 {
    font-size: 3rem;
    font-weight: 700;
    color: #ff7f50;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 1.2rem;
    color: #555;
  }

  nav {
    margin-top: 1.5rem;
  }

  nav a {
    text-decoration: none;
    margin: 0 1rem;
    padding: 0.5rem 1.5rem;
    border-radius: 50px;
    background: #ffd1dc;
    color: #ff4f79;
    font-weight: 700;
    box-shadow: 8px 8px 16px #cbb7c9, -8px -8px 16px #ffe1f0;
    transition: all 0.3s;
  }

  nav a:hover {
    transform: translateY(-3px);
    box-shadow: 4px 4px 12px #cbb7c9, -4px -4px 12px #ffe1f0;
    color: #fff;
    background: #ff7f50;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4rem;
  }

  .panel {
    background: #ffe4e1;
    border-radius: 30px;
    padding: 3rem;
    max-width: 650px;
    text-align: center;
    box-shadow: 12px 12px 24px #cbb7c9, -12px -12px 24px #fff0f5;
  }

  .panel h2 {
    font-size: 2.2rem;
    color: #ff4f79;
    margin-bottom: 1rem;
  }

  .panel p {
    font-size: 1.15rem;
    line-height: 1.6;
    color: #333;
    margin-bottom: 2rem;
  }

  .btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
    background: #ff7f50;
    border-radius: 50px;
    box-shadow: 8px 8px 16px #cbb7c9, -8px -8px 16px #ffe1f0;
    text-decoration: none;
    transition: all 0.3s;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 4px 4px 12px #cbb7c9, -4px -4px 12px #ffe1f0;
  }

  footer {
    text-align: center;
    padding: 2rem 4rem;
    font-size: 0.9rem;
    background: #f0f4f8;
    color: #333;
  }
</style>
</head>
<body>

<header>
  <h1>CLAYMORPHISM</h1>
  <p>Soft • 3D • Playful</p>
  <nav>
    <a href="#">Home</a>
    <a href="#">Gallery</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<main>
  <div class="panel">
    <h2>Welcome to the Clay World</h2>
    <p>
      Explore <strong>Claymorphism</strong> design: soft shapes, pastel colors, and smooth shadows.<br>
      Everything feels tactile and playful, almost like it’s made of clay.
    </p>
    <a href="#" class="btn">Get Started</a>
  </div>
</main>

<footer>
  © 2025 • Inspired by Claymorphism Design Trends
</footer>

</body>
</html>
